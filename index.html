<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私の広辞苑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --paper: #fffef9; --ink: #1a1208; --ink-light: #5a4e3a;
    --ink-muted: #9a8e7a; --accent: #8b1a1a; --gold: #b8860b;
    --gold-light: #f5e6a3; --border: #d4c9b0; --border-soft: #e8e0d0;
    --shadow: rgba(26,18,8,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif JP', serif; background: var(--bg); color: var(--ink); min-height: 100vh;
    background-image: repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(180,160,120,0.08) 59px,rgba(180,160,120,0.08) 60px);
  }

  header { background: var(--ink); color: var(--gold-light); padding: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  .header-inner { display: flex; align-items: center; gap: 12px; padding: 10px 16px; }
  .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.12em; white-space: nowrap; border-right: 1px solid rgba(184,134,11,0.4); padding-right: 14px; line-height: 1.4; }
  .logo span { display: block; font-size: 0.52rem; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.18em; color: rgba(184,134,11,0.7); font-weight: 300; }
  .search-bar { flex: 1; position: relative; }
  .search-bar input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(184,134,11,0.3); border-radius: 3px; padding: 7px 32px 7px 10px; font-family: 'Noto Serif JP', serif; font-size: 0.88rem; color: var(--gold-light); outline: none; transition: border-color 0.2s; }
  .search-bar input::placeholder { color: rgba(245,230,163,0.4); }
  .search-bar input:focus { border-color: var(--gold); }
  .search-icon { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: rgba(184,134,11,0.6); font-size: 0.8rem; pointer-events: none; }

  nav.tabs { display: flex; border-top: 1px solid rgba(184,134,11,0.15); }
  nav.tabs button { flex: 1; background: none; border: none; color: rgba(245,230,163,0.55); font-family: 'Noto Sans JP', sans-serif; font-size: 0.75rem; letter-spacing: 0.08em; padding: 7px 4px; cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; }
  nav.tabs button:hover { color: var(--gold-light); }
  nav.tabs button.active { color: var(--gold-light); border-bottom: 2px solid var(--gold); }

  main { max-width: 720px; margin: 0 auto; padding: 20px 14px 80px; }
  .view { display: none; }
  .view.active { display: block; }

  /* ローディング */
  .loading { text-align: center; padding: 60px 20px; }
  .loading-spin { font-size: 2rem; animation: spin 1.2s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { margin-top: 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; color: var(--ink-muted); }

  /* 一覧 */
  .stats-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .count { font-family: 'Noto Sans JP', sans-serif; font-size: 0.78rem; color: var(--ink-muted); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .filter-btn { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.7rem; color: var(--ink-muted); cursor: pointer; transition: all 0.18s; }
  .filter-btn:hover, .filter-btn.active { background: var(--ink); color: var(--gold-light); border-color: var(--ink); }

  .dict-list { display: flex; flex-direction: column; }
  .dict-entry { background: var(--paper); border: 1px solid var(--border-soft); border-bottom: none; padding: 14px 16px; cursor: pointer; transition: background 0.15s; position: relative; }
  .dict-entry:first-child { border-radius: 4px 4px 0 0; }
  .dict-entry:last-child { border-radius: 0 0 4px 4px; border-bottom: 1px solid var(--border-soft); }
  .dict-entry:only-child { border-radius: 4px; border-bottom: 1px solid var(--border-soft); }
  .dict-entry:hover, .dict-entry:active { background: #fdf9f0; }
  .entry-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
  .entry-word { font-size: 1.1rem; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; }
  .entry-reading { font-size: 0.75rem; color: var(--ink-muted); font-family: 'Noto Sans JP', sans-serif; }
  .entry-tags { margin-left: auto; display: flex; gap: 4px; }
  .tag { font-family: 'Noto Sans JP', sans-serif; font-size: 0.62rem; padding: 1px 6px; border-radius: 2px; }
  .tag-cat { background: #f5e6a3; color: var(--gold); border: 1px solid rgba(184,134,11,0.3); }
  .tag-mem { background: #e8f4e8; color: #2a6a2a; border: 1px solid rgba(42,106,42,0.25); }
  .entry-def { font-size: 0.83rem; color: var(--ink-light); line-height: 1.75; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-muted); }
  .empty-state .big { font-size: 2.8rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.88rem; line-height: 1.8; }

  /* 詳細モーダル */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,18,8,0.55); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--paper); border-radius: 12px 12px 0 0; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 -4px 32px rgba(0,0,0,0.2); animation: slideUp 0.28s cubic-bezier(.4,0,.2,1); }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
  .modal-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border-soft); display: flex; justify-content: space-between; align-items: flex-start; }
  .modal-word { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .modal-reading { font-size: 0.78rem; color: var(--ink-muted); font-family: 'Noto Sans JP', sans-serif; margin-top: 2px; }
  .modal-close { background: none; border: none; font-size: 1.2rem; color: var(--ink-muted); cursor: pointer; padding: 0 4px; }
  .modal-body { padding: 16px 20px 32px; }
  .modal-section-label { font-family: 'Noto Sans JP', sans-serif; font-size: 0.68rem; letter-spacing: 0.15em; color: var(--ink-muted); margin-bottom: 8px; margin-top: 14px; }
  .modal-def { font-size: 0.9rem; line-height: 1.9; color: var(--ink); white-space: pre-wrap; background: var(--bg); padding: 12px 14px; border-radius: 3px; border-left: 3px solid var(--accent); }
  .modal-meta-text { font-family: 'Noto Sans JP', sans-serif; font-size: 0.8rem; color: var(--ink-muted); line-height: 1.7; }

  /* フラッシュカード */
  .flash-wrap { max-width: 480px; margin: 0 auto; }
  .flash-filter-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
  .flash-progress { text-align: center; font-family: 'Noto Sans JP', sans-serif; font-size: 0.78rem; color: var(--ink-muted); margin-bottom: 16px; }
  .flash-progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .flash-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .flashcard-scene { perspective: 1200px; margin-bottom: 20px; }
  .flashcard { position: relative; height: 260px; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(.4,0,.2,1); cursor: pointer; }
  .flashcard.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; background: var(--paper); border: 1px solid var(--border-soft); border-radius: 10px; box-shadow: 0 4px 24px var(--shadow); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px; text-align: center; }
  .card-face.back { transform: rotateY(180deg); justify-content: flex-start; overflow-y: auto; }
  .card-hint { font-family: 'Noto Sans JP', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--ink-muted); margin-bottom: 16px; }
  .card-word { font-size: 2rem; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 6px; }
  .card-reading { font-size: 0.82rem; color: var(--ink-muted); font-family: 'Noto Sans JP', sans-serif; }
  .card-def { font-size: 0.85rem; line-height: 1.9; color: var(--ink-light); text-align: left; width: 100%; margin-top: 10px; }
  .card-def-word { font-size: 1.1rem; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .flash-controls { display: flex; gap: 10px; margin-bottom: 14px; }
  .flash-btn { flex: 1; padding: 11px; border: none; border-radius: 5px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.18s; letter-spacing: 0.05em; }
  .flash-btn.again { background: #fff0f0; color: #c00; border: 1px solid #ffd0d0; }
  .flash-btn.good  { background: #f0fff0; color: #2a6a2a; border: 1px solid #b0e0b0; }
  .flash-flip-hint { text-align: center; font-family: 'Noto Sans JP', sans-serif; font-size: 0.73rem; color: var(--ink-muted); letter-spacing: 0.1em; }
  .flash-done { text-align: center; padding: 50px 20px; }
  .flash-done .big { font-size: 2.8rem; margin-bottom: 10px; }
  .flash-done h2 { font-size: 1rem; margin-bottom: 6px; }
  .flash-done p { font-size: 0.83rem; color: var(--ink-muted); margin-bottom: 20px; }
  .btn-restart { background: var(--accent); color: #fff; border: none; border-radius: 3px; padding: 10px 28px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; cursor: pointer; }

  /* 更新日時 */
  .updated-bar { text-align: right; font-family: 'Noto Sans JP', sans-serif; font-size: 0.7rem; color: var(--ink-muted); margin-bottom: 12px; }

  /* エラー表示 */
  .error-state { text-align: center; padding: 40px 20px; }
  .error-state .big { font-size: 2.5rem; margin-bottom: 10px; }
  .error-state p { font-size: 0.85rem; color: var(--ink-muted); line-height: 1.8; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">私の広辞苑<span>MY DICTIONARY</span></div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="ことばを検索…" oninput="renderList()">
      <span class="search-icon">🔍</span>
    </div>
  </div>
  <nav class="tabs">
    <button class="active" onclick="switchTab('list',this)">📖　一覧</button>
    <button onclick="switchTab('flash',this)">🃏　暗記</button>
  </nav>
</header>

<main>
  <div id="view-list" class="view active">
    <div id="loadingState" class="loading">
      <div class="loading-spin">📖</div>
      <p>データを読み込んでいます…</p>
    </div>
    <div id="listContent" style="display:none">
      <div class="updated-bar" id="updatedBar"></div>
      <div class="stats-bar">
        <span class="count" id="countLabel">0 語</span>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
          <button class="filter-btn" onclick="setFilter('未習得',this)">未習得</button>
          <button class="filter-btn" onclick="setFilter('習得済',this)">習得済</button>
        </div>
      </div>
      <div class="dict-list" id="dictList"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="big">📖</div>
        <p>まだことばが登録されていません</p>
      </div>
    </div>
    <div id="errorState" class="error-state" style="display:none">
      <div class="big">⚠️</div>
      <p id="errorMsg">データの読み込みに失敗しました</p>
    </div>
  </div>

  <div id="view-flash" class="view">
    <div class="flash-wrap">
      <div class="flash-filter-row" id="flashFilterRow">
        <button class="filter-btn active" onclick="setFlashFilter('all',this)">すべて</button>
        <button class="filter-btn" onclick="setFlashFilter('未習得',this)">未習得のみ</button>
      </div>
      <div id="flashInner"></div>
    </div>
  </div>
</main>

<!-- 詳細モーダル（下から出るiOS風） -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-word" id="mWord"></div>
        <div class="modal-reading" id="mReading"></div>
      </div>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section-label">意　味</div>
      <div class="modal-def" id="mDef"></div>
      <div id="mMemoSection">
        <div class="modal-section-label">メ　モ</div>
        <div class="modal-meta-text" id="mMemo"></div>
      </div>
      <div style="margin-top:14px;display:flex;gap:6px;flex-wrap:wrap" id="mMeta"></div>
    </div>
  </div>
</div>

<script>
// GitHub Pages上のdata.jsonを読み込む
const DATA_URL = './data.json';

let entries = [];
let currentFilter = 'all';
let flashFilter = 'all';
let flashQueue = [];
let flashIdx = 0;
let flashFlipped = false;
// iPhone側でも「覚えた」をセッション内で保持（localStorageに保存）
const LS_LEARNED = 'kojien_learned_v1';
let localLearned = new Set();

function loadLocalLearned() {
  try { localLearned = new Set(JSON.parse(localStorage.getItem(LS_LEARNED)||'[]')); } catch { localLearned = new Set(); }
}
function saveLocalLearned() { localStorage.setItem(LS_LEARNED, JSON.stringify([...localLearned])); }

async function fetchData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now()); // キャッシュバスト
    if (!res.ok) throw new Error('HTTP ' + res.status);
    entries = await res.json();
    // localLearnedをマージ
    entries = entries.map(e => ({...e, learned: e.learned || localLearned.has(e.id)}));
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('listContent').style.display = 'block';
    const now = new Date();
    document.getElementById('updatedBar').textContent =
      `最終更新: ${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    renderList();
  } catch(err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorMsg').textContent =
      'data.json の読み込みに失敗しました。\nGitHubリポジトリにdata.jsonがあるか確認してください。\n(' + err.message + ')';
  }
}

function renderList() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = entries;
  if (currentFilter === '未習得') list = list.filter(e => !e.learned);
  if (currentFilter === '習得済')  list = list.filter(e =>  e.learned);
  if (q) list = list.filter(e =>
    e.word.toLowerCase().includes(q)||(e.reading||'').includes(q)||
    (e.def||'').includes(q)||(e.cat||'').includes(q)
  );
  list = [...list].sort((a,b)=>(a.reading||a.word).localeCompare(b.reading||b.word,'ja'));
  document.getElementById('countLabel').textContent = list.length + ' 語';
  const el = document.getElementById('dictList');
  const empty = document.getElementById('emptyState');
  if (list.length===0) { el.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  el.innerHTML = list.map(e=>`
    <div class="dict-entry" onclick="openDetail('${e.id}')">
      <div class="entry-head">
        <span class="entry-word">${esc(e.word)}</span>
        ${e.reading?`<span class="entry-reading">【${esc(e.reading)}】</span>`:''}
        <div class="entry-tags">
          ${e.cat?`<span class="tag tag-cat">${esc(e.cat)}</span>`:''}
          ${e.learned?`<span class="tag tag-mem">習得済</span>`:''}
        </div>
      </div>
      <div class="entry-def">${esc(e.def)}</div>
    </div>
  `).join('');
}

function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.stats-bar .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function switchTab(name,btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (name==='flash') initFlash();
}

function openDetail(id) {
  const e=entries.find(x=>x.id===id); if(!e) return;
  document.getElementById('mWord').textContent=e.word;
  document.getElementById('mReading').textContent=e.reading?`【${e.reading}】`:'';
  document.getElementById('mDef').textContent=e.def;
  const memoSec=document.getElementById('mMemoSection');
  if(e.memo){document.getElementById('mMemo').textContent=e.memo;memoSec.style.display='';}
  else{memoSec.style.display='none';}
  const meta=[];
  if(e.cat) meta.push(`<span class="tag tag-cat">${esc(e.cat)}</span>`);
  if(e.learned) meta.push(`<span class="tag tag-mem">習得済</span>`);
  document.getElementById('mMeta').innerHTML=meta.join('');
  document.getElementById('detailModal').classList.add('open');
}
function closeDetailModal(){document.getElementById('detailModal').classList.remove('open');}
function closeModal(e){if(e.target.id==='detailModal')closeDetailModal();}

// フラッシュカード
function initFlash() {
  let pool = entries;
  if (flashFilter==='未習得') pool=pool.filter(e=>!e.learned);
  flashQueue=[...pool].sort(()=>Math.random()-0.5);
  flashIdx=0; flashFlipped=false; renderFlash();
}
function setFlashFilter(f,btn){
  flashFilter=f;
  document.querySelectorAll('#flashFilterRow .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); initFlash();
}
function renderFlash(){
  const wrap=document.getElementById('flashInner');
  if(flashQueue.length===0){
    wrap.innerHTML=`<div class="flash-done"><div class="big">📖</div><p>ことばが登録されていません</p></div>`;return;
  }
  if(flashIdx>=flashQueue.length){
    wrap.innerHTML=`<div class="flash-done"><div class="big">🎉</div><h2>セッション完了！</h2><p>${flashQueue.length} 語を確認しました</p><button class="btn-restart" onclick="initFlash()">もう一度</button></div>`;return;
  }
  const e=flashQueue[flashIdx];
  const prog=Math.round((flashIdx/flashQueue.length)*100);
  wrap.innerHTML=`
    <div class="flash-progress">${flashIdx+1} / ${flashQueue.length}
      <div class="flash-progress-bar"><div class="flash-progress-fill" style="width:${prog}%"></div></div>
    </div>
    <div class="flashcard-scene">
      <div class="flashcard ${flashFlipped?'flipped':''}" onclick="flipCard()">
        <div class="card-face front">
          <div class="card-hint">このことばの意味は？</div>
          <div class="card-word">${esc(e.word)}</div>
          ${e.reading?`<div class="card-reading">【${esc(e.reading)}】</div>`:''}
          ${e.cat?`<div style="margin-top:10px"><span class="tag tag-cat">${esc(e.cat)}</span></div>`:''}
        </div>
        <div class="card-face back">
          <div class="card-hint" style="width:100%">意　味</div>
          <div class="card-def-word">${esc(e.word)}</div>
          <div class="card-def">${esc(e.def)}</div>
          ${e.memo?`<div style="margin-top:8px;font-size:0.75rem;color:var(--ink-muted);font-family:'Noto Sans JP',sans-serif">${esc(e.memo)}</div>`:''}
        </div>
      </div>
    </div>
    ${flashFlipped?`
    <div class="flash-controls">
      <button class="flash-btn again" onclick="flashAction('again')">もう一度</button>
      <button class="flash-btn good"  onclick="flashAction('good')">覚えた！</button>
    </div>`:`<p class="flash-flip-hint">カードをタップして意味を確認</p>`}
  `;
}
function flipCard(){if(!flashFlipped){flashFlipped=true;renderFlash();}}
function flashAction(result){
  if(result==='good'){
    const e=flashQueue[flashIdx];
    const idx=entries.findIndex(x=>x.id===e.id);
    if(idx>-1){entries[idx].learned=true;localLearned.add(e.id);saveLocalLearned();}
  } else { flashQueue.push(flashQueue[flashIdx]); }
  flashIdx++; flashFlipped=false; renderFlash();
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

loadLocalLearned();
fetchData();
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetailModal();});
</script>
</body>
</html>
