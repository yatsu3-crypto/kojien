<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私の広辞苑 — 編集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --paper: #fffef9; --ink: #1a1208; --ink-light: #5a4e3a;
    --ink-muted: #9a8e7a; --accent: #8b1a1a; --gold: #b8860b;
    --gold-light: #f5e6a3; --border: #d4c9b0; --border-soft: #e8e0d0;
    --shadow: rgba(26,18,8,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Serif JP', serif; background: var(--bg); color: var(--ink); min-height: 100vh;
    background-image: repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(180,160,120,0.08) 59px,rgba(180,160,120,0.08) 60px); }

  header { background: var(--ink); color: var(--gold-light); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.12em; }
  .logo span { display: block; font-size: 0.55rem; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.2em; color: rgba(184,134,11,0.7); font-weight: 300; }
  .badge { background: var(--accent); color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.1em; }

  .search-bar { flex: 1; position: relative; }
  .search-bar input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(184,134,11,0.3); border-radius: 3px; padding: 7px 36px 7px 12px; font-family: 'Noto Serif JP', serif; font-size: 0.9rem; color: var(--gold-light); outline: none; transition: border-color 0.2s; }
  .search-bar input::placeholder { color: rgba(245,230,163,0.4); }
  .search-bar input:focus { border-color: var(--gold); }

  main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 60px; display: grid; grid-template-columns: 380px 1fr; gap: 24px; }

  /* フォーム */
  .add-form { background: var(--paper); border: 1px solid var(--border-soft); border-radius: 6px; padding: 24px; box-shadow: 0 2px 16px var(--shadow); position: sticky; top: 80px; }
  .form-title { font-size: 1rem; font-weight: 600; letter-spacing: 0.08em; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid var(--accent); color: var(--accent); }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-family: 'Noto Sans JP', sans-serif; font-size: 0.75rem; color: var(--ink-muted); letter-spacing: 0.1em; margin-bottom: 4px; }
  label span.req { color: var(--accent); }
  input[type=text], textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 8px 10px; font-family: 'Noto Serif JP', serif; font-size: 0.88rem; color: var(--ink); outline: none; transition: border-color 0.2s; }
  input[type=text]:focus, textarea:focus { border-color: var(--accent); background: var(--paper); }
  textarea { resize: vertical; min-height: 100px; line-height: 1.8; }
  .inline-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mem-check { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .mem-check input { width: auto; }
  .mem-check label { margin: 0; font-size: 0.82rem; color: var(--ink-light); letter-spacing: 0; }
  .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 3px; padding: 10px; font-family: 'Noto Serif JP', serif; font-size: 0.92rem; letter-spacing: 0.1em; cursor: pointer; transition: background 0.2s; margin-top: 6px; }
  .btn-primary:hover { background: #a01a1a; }
  .btn-secondary { width: 100%; background: none; border: 1px solid var(--border); border-radius: 3px; padding: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.82rem; color: var(--ink-light); cursor: pointer; transition: all 0.15s; margin-top: 6px; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* エクスポートパネル */
  .export-panel { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-soft); }
  .export-panel h3 { font-family: 'Noto Sans JP', sans-serif; font-size: 0.75rem; letter-spacing: 0.12em; color: var(--ink-muted); margin-bottom: 10px; }
  .btn-export { width: 100%; background: var(--ink); color: var(--gold-light); border: none; border-radius: 3px; padding: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.82rem; letter-spacing: 0.1em; cursor: pointer; transition: background 0.2s; }
  .btn-export:hover { background: #2a1e08; }
  .import-label { display: block; width: 100%; background: none; border: 1px dashed var(--border); border-radius: 3px; padding: 9px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.78rem; color: var(--ink-muted); cursor: pointer; text-align: center; transition: all 0.15s; margin-top: 6px; }
  .import-label:hover { border-color: var(--gold); color: var(--gold); }
  #importFile { display: none; }

  /* 一覧 */
  .list-panel {}
  .stats-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .count { font-family: 'Noto Sans JP', sans-serif; font-size: 0.8rem; color: var(--ink-muted); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .filter-btn { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 3px 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.72rem; color: var(--ink-muted); cursor: pointer; transition: all 0.18s; }
  .filter-btn:hover, .filter-btn.active { background: var(--ink); color: var(--gold-light); border-color: var(--ink); }

  .dict-list { display: flex; flex-direction: column; }
  .dict-entry { background: var(--paper); border: 1px solid var(--border-soft); border-bottom: none; padding: 14px 18px; transition: background 0.15s; position: relative; }
  .dict-entry:first-child { border-radius: 4px 4px 0 0; }
  .dict-entry:last-child { border-radius: 0 0 4px 4px; border-bottom: 1px solid var(--border-soft); }
  .dict-entry:only-child { border-radius: 4px; border-bottom: 1px solid var(--border-soft); }
  .dict-entry:hover { background: #fdf9f0; }
  .entry-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .entry-word { font-size: 1.05rem; font-weight: 600; color: var(--accent); }
  .entry-reading { font-size: 0.75rem; color: var(--ink-muted); font-family: 'Noto Sans JP', sans-serif; }
  .entry-tags { margin-left: auto; display: flex; gap: 4px; }
  .tag { font-family: 'Noto Sans JP', sans-serif; font-size: 0.62rem; padding: 1px 6px; border-radius: 2px; }
  .tag-cat { background: #f5e6a3; color: var(--gold); border: 1px solid rgba(184,134,11,0.3); }
  .tag-mem { background: #e8f4e8; color: #2a6a2a; border: 1px solid rgba(42,106,42,0.25); }
  .entry-def { font-size: 0.82rem; color: var(--ink-light); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .entry-actions { position: absolute; right: 12px; bottom: 10px; display: flex; gap: 5px; opacity: 0; transition: opacity 0.15s; }
  .dict-entry:hover .entry-actions { opacity: 1; }
  .btn-icon { background: none; border: 1px solid var(--border); border-radius: 3px; padding: 2px 8px; font-size: 0.7rem; color: var(--ink-muted); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.del:hover { border-color: #c00; color: #c00; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-muted); }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 10px; }

  .toast { position: fixed; bottom: 24px; right: 20px; background: var(--ink); color: var(--gold-light); padding: 10px 18px; border-radius: 4px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.82rem; z-index: 999; transform: translateY(60px); opacity: 0; transition: all 0.3s ease; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; }
    .add-form { position: static; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">私の広辞苑<span>PC EDITOR</span></div>
  <span class="badge">✏️ 編集モード</span>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="ことばを検索…" oninput="renderList()">
  </div>
</header>

<main>
  <!-- フォーム -->
  <div>
    <div class="add-form">
      <div class="form-title" id="formTitle">新しいことばを登録</div>
      <div class="inline-row">
        <div class="form-group">
          <label>ことば<span class="req">*</span></label>
          <input type="text" id="fWord" placeholder="例：忖度">
        </div>
        <div class="form-group">
          <label>読み仮名</label>
          <input type="text" id="fReading" placeholder="例：そんたく">
        </div>
      </div>
      <div class="form-group">
        <label>広辞苑の意味<span class="req">*</span></label>
        <textarea id="fDef" placeholder="広辞苑や辞書の定義をここに貼り付け…"></textarea>
      </div>
      <div class="inline-row">
        <div class="form-group">
          <label>カテゴリ</label>
          <input type="text" id="fCat" placeholder="例：法律、医療">
        </div>
        <div class="form-group">
          <label>メモ</label>
          <input type="text" id="fMemo" placeholder="使い方・例文など">
        </div>
      </div>
      <div class="form-group">
        <div class="mem-check">
          <input type="checkbox" id="fLearned">
          <label for="fLearned">習得済みとしてマーク</label>
        </div>
      </div>
      <input type="hidden" id="editId">
      <button class="btn-primary" onclick="saveEntry()">登録する</button>
      <button class="btn-secondary" onclick="resetForm()" id="cancelBtn" style="display:none">キャンセル</button>

      <div class="export-panel">
        <h3>📤 GitHub同期</h3>
        <button class="btn-export" onclick="exportJSON()">data.json をダウンロード</button>
        <label class="import-label" for="importFile">📥 data.json を読み込む（バックアップから復元）</label>
        <input type="file" id="importFile" accept=".json" onchange="importJSON(event)">
      </div>
    </div>
  </div>

  <!-- 一覧 -->
  <div class="list-panel">
    <div class="stats-bar">
      <span class="count" id="countLabel">0 語</span>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
        <button class="filter-btn" onclick="setFilter('未習得',this)">未習得</button>
        <button class="filter-btn" onclick="setFilter('習得済',this)">習得済</button>
      </div>
    </div>
    <div class="dict-list" id="dictList"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="big">📖</div>
      <p>ことばを登録してください</p>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'kojien_entries_v1';
let entries = [];
let currentFilter = 'all';

function load() { try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { entries = []; } }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
function nextId() { return Date.now() + '_' + Math.random().toString(36).slice(2,7); }

function renderList() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = entries;
  if (currentFilter === '未習得') list = list.filter(e => !e.learned);
  if (currentFilter === '習得済')  list = list.filter(e =>  e.learned);
  if (q) list = list.filter(e =>
    e.word.toLowerCase().includes(q) || (e.reading||'').includes(q) ||
    (e.def||'').includes(q) || (e.cat||'').includes(q)
  );
  list = [...list].sort((a,b) => (a.reading||a.word).localeCompare(b.reading||b.word,'ja'));
  document.getElementById('countLabel').textContent = list.length + ' 語';
  const el = document.getElementById('dictList');
  const empty = document.getElementById('emptyState');
  if (list.length === 0) { el.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  el.innerHTML = list.map(e => `
    <div class="dict-entry">
      <div class="entry-head">
        <span class="entry-word">${esc(e.word)}</span>
        ${e.reading ? `<span class="entry-reading">【${esc(e.reading)}】</span>` : ''}
        <div class="entry-tags">
          ${e.cat ? `<span class="tag tag-cat">${esc(e.cat)}</span>` : ''}
          ${e.learned ? `<span class="tag tag-mem">習得済</span>` : ''}
        </div>
      </div>
      <div class="entry-def">${esc(e.def)}</div>
      <div class="entry-actions">
        <button class="btn-icon" onclick="startEdit('${e.id}')">編集</button>
        <button class="btn-icon del" onclick="deleteEntry('${e.id}')">削除</button>
      </div>
    </div>
  `).join('');
}

function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function resetForm() {
  ['fWord','fReading','fDef','fCat','fMemo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fLearned').checked=false;
  document.getElementById('editId').value='';
  document.getElementById('formTitle').textContent='新しいことばを登録';
  document.getElementById('cancelBtn').style.display='none';
}

function saveEntry() {
  const word = document.getElementById('fWord').value.trim();
  const def  = document.getElementById('fDef').value.trim();
  if (!word||!def) { showToast('ことばと意味は必須です'); return; }
  const id = document.getElementById('editId').value;
  const obj = {
    id: id || nextId(), word,
    reading: document.getElementById('fReading').value.trim(),
    def,
    cat:    document.getElementById('fCat').value.trim(),
    memo:   document.getElementById('fMemo').value.trim(),
    learned: document.getElementById('fLearned').checked,
    createdAt: id ? (entries.find(e=>e.id===id)?.createdAt||Date.now()) : Date.now(),
  };
  if (id) { const i=entries.findIndex(e=>e.id===id); if(i>-1) entries[i]=obj; showToast('更新しました'); }
  else { entries.push(obj); showToast(`「${word}」を登録しました`); }
  save(); resetForm(); renderList();
}

function startEdit(id) {
  const e=entries.find(x=>x.id===id); if(!e) return;
  document.getElementById('fWord').value=e.word;
  document.getElementById('fReading').value=e.reading||'';
  document.getElementById('fDef').value=e.def;
  document.getElementById('fCat').value=e.cat||'';
  document.getElementById('fMemo').value=e.memo||'';
  document.getElementById('fLearned').checked=!!e.learned;
  document.getElementById('editId').value=e.id;
  document.getElementById('formTitle').textContent='編集：'+e.word;
  document.getElementById('cancelBtn').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function deleteEntry(id) {
  if(!confirm('このことばを削除しますか？')) return;
  entries=entries.filter(e=>e.id!==id); save(); renderList(); showToast('削除しました');
}

// JSONエクスポート（→ GitHubにコミットしてiPhoneで参照）
function exportJSON() {
  const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.json';
  a.click();
  showToast('data.json をダウンロードしました。GitHubにコミットしてください。');
}

function importJSON(evt) {
  const file = evt.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error();
      entries = data; save(); renderList();
      showToast(`${data.length} 語を読み込みました`);
    } catch { showToast('JSONファイルの形式が正しくありません'); }
  };
  reader.readAsText(file);
  evt.target.value='';
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

load(); renderList();
</script>
</body>
</html>
